version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.fastapi

    container_name: aegis-backend

    environment:
      - QDRANT_HOST=qdrant

    ports:
      - "8000:8000"

    depends_on:
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: aegis-frontend

    environment:
      - API_URL=http://backend:8000

    ports:
      - "8501:8501"

    depends_on:
      - backend